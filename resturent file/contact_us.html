<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Lecker Bites</title>
    <link rel="stylesheet" href="contact_us.css">
</head>
<body>
    <div class="page-wrap">
        <header class="site-header">
            <h1>Lecker Bites</h1>
            <p>Fresh food, warm service</p>
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="reservation.html">Reservation</a>
                <a href="contact_us.html">Contact</a>
                <a href="about_us.html">About</a>
            </nav>
        </header>

        <main class="hero">
            <h2>Contact Us</h2>
            <p>We would love to hear from you. Fill out the form below and we will get back to you soon.</p>
        </main>

        <section class="contact-card">
            <form action="#" method="post">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Tell us what you think..." rows="6" required></textarea>
                </div>

                <button type="submit" class="button button-primary">Send Message</button>
            </form>
        </section>

        <footer class="site-footer">
            <p>&copy; 2026 Lecker Bites. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
