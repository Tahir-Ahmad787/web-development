<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make a Reservation</title>
</head>
<body>
    <center><h1>Make a Reservation</h1></center>
    <center><p>Please fill out the form below to reserve your table.</p></center>
    <!-- Reservation form would go here -->
     <form action="#" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone"><br><br>
        <label for="date">Date:</label>
        <input type="date" id="date" name="date"><br><br>
        <label for="time">Time:</label>
        <input type="time" id="time" name="time"><br><br>
        <label for="guests">Number of Guests:</label>
        <input type="number" id="guests" name="guests" min="1"><br><br>
        <input type="submit" value="Reserve Table">
     </form>
</body>
</html>
