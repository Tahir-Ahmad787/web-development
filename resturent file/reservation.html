<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation | Lecker Bites</title>
    <link rel="stylesheet" href="reservation.css">
</head>
<body>
    <div class="page-wrap">
        <header class="site-header">
            <h1>Lecker Bites</h1>
            <p>Fresh food, warm service</p>
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="reservation.html">Reservation</a>
                <a href="contact_us.html">Contact</a>
                <a href="about_us.html">About</a>
            </nav>
        </header>

        <main class="hero">
            <h2>Reserve Your Table</h2>
            <p>Book your table quickly with our easy reservation form.</p>
        </main>

        <section class="reservation-card">
            <form action="#" method="post">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone" placeholder="03x-xxxxxxx"required>
                </div>

                <div class="form-group half-width">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" required>
                </div>

                <div class="form-group half-width">
                    <label for="time">Time</label>
                    <input type="time" id="time" name="time" required>
                </div>

                <div class="form-group">
                    <label for="guests">Number of Guests</label>
                    <input type="number" id="guests" name="guests" min="1" value="1" required>
                </div>

                <button type="submit" class="button button-primary">Reserve Table</button>
            </form>
        </section>

        <footer class="site-footer">
            <p>&copy; 2026 Lecker Bites. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
